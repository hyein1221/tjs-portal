<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>탕정삼성어린이집 소모품관리 시스템</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6fa;
      color: #111827;
    }
    header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 18px 24px;
      font-size: 26px;
      font-weight: 900;
      color: #000;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-img { height: 32px; width: auto; object-fit: contain; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .top-box {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .user-info { font-weight: 700; line-height: 1.6; }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button {
      border: 1px solid #d1d5db;
      background: white;
      padding: 9px 13px;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 700;
    }
    button:hover { background: #f3f4f6; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .primary { background: #2563eb; color: white; border-color: #2563eb; }
    .primary:hover { background: #1d4ed8; }
    .danger { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }
    .green { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    .blue { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
    .gray { background: #f9fafb; color: #374151; border-color: #d1d5db; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .tab {
      background: white;
      border: 1px solid #d1d5db;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 800;
    }
    .tab.active { background: #111827; color: white; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
    }
    h2 { margin: 0 0 14px; font-size: 21px; }
    h3 { margin: 18px 0 10px; font-size: 17px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    label { font-size: 13px; font-weight: 800; color: #374151; display: block; margin-bottom: 5px; }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      font-size: 14px;
      background: white;
    }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td {
      border: 1px solid #d1d5db;
      padding: 8px;
      font-size: 13px;
      text-align: center;
      vertical-align: middle;
    }
    th { background: #f3f4f6; font-weight: 800; }
    td.left { text-align: left; }
    .table-wrap { overflow-x: auto; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .summary div {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      font-weight: 800;
    }
    .small { font-size: 12px; color: #6b7280; font-weight: 500; }
    .site-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      line-height: 1.6;
    }
    .hidden { display: none !important; }
    .error-box, .success-box, .lock-notice {
      display: none;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: 800;
      line-height: 1.5;
    }
    .error-box { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
    .success-box { background: #dcfce7; border: 1px solid #86efac; color: #166534; }
    .lock-notice { background: #f3f4f6; border: 1px solid #d1d5db; color: #374151; }
    .locked-area { opacity: .55; background: #f3f4f6; border-color: #d1d5db; }
    .locked-row { background: #f3f4f6 !important; color: #6b7280; }
    .over-budget { background: #fee2e2 !important; border-color: #fca5a5 !important; color: #b91c1c !important; }
    .budget-ok { background: #ecfdf5 !important; border-color: #bbf7d0 !important; color: #166534 !important; }
    .budget-warning { background: #fff7ed !important; border-color: #fdba74 !important; color: #c2410c !important; }
    @media (max-width: 850px) {
      .grid, .grid-3, .summary { grid-template-columns: 1fr; }
      .top-box { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
<header><img src="logo.png" alt="로고" class="logo-img"> 탕정삼성어린이집 소모품관리 시스템</header>

<div class="wrap">
  <div class="top-box">
    <div class="user-info">
      <span id="loginName">-</span> / <span id="loginClass">-</span> / <span id="loginRole">-</span><br>
      <span class="small">자동 로그아웃: <span id="autoLogoutTimer">30:00</span></span>
    </div>
    <div class="btns" id="pageModeButtons">
      <button class="blue" id="teacherModeBtn" onclick="setMode('teacher')">반별 신청 페이지</button>
      <button class="green" id="managerModeBtn" onclick="setMode('manager')">소모품담당자 페이지</button>
      <button class="gray" onclick="goPortal()">통합포털로 이동</button>
      <button class="danger" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-apply" onclick="openPanel('apply')">반별 소모품 신청서</button>
    <button class="tab" id="tab-sites" onclick="openPanel('sites')">구매 가능 사이트</button>
    <button class="tab manager-tab hidden" id="tab-common" onclick="openPanel('common')">공동 소모품 신청서</button>
    <button class="tab manager-tab hidden" id="tab-collect" onclick="openPanel('collect')">소모품 취합</button>
    <button class="tab admin-tab hidden" id="tab-history" onclick="openPanel('history')">수정·삭제 기록</button>
  </div>

  <section id="panel-apply" class="panel active">
    <div class="card">
      <h2>반별 소모품 신청서</h2>
      <div class="grid">
        <div><label>연도/월</label><input type="month" id="month" onchange="renderMy()"></div>
      </div>
      <input type="hidden" id="age">
      <input type="hidden" id="room">
      <input type="hidden" id="writer">
      <input type="hidden" id="budget">

      <h3>품목 입력</h3>
      <div id="lockNotice" class="lock-notice">🔒 신청 완료 상태입니다. 수정하려면 신청 취소를 먼저 눌러주세요.</div>
      <div class="grid" id="inputArea">
        <div><label>구매처</label><select id="vendor" onchange="toggleProductNo()"><option>우림문구</option><option>G마켓</option><option>기타 지정 사이트</option></select></div>
        <div id="productNoBox" class="hidden"><label>G마켓 상품번호</label><input id="productNo" placeholder="G마켓일 때만 입력"></div>
        <div><label>품명</label><input id="itemName" placeholder="예: 화이트보드"></div>
        <div><label>크기</label><input id="itemSize" placeholder="예: 26x26cm"></div>
        <div><label>색상</label><input id="itemColor" placeholder="예: 분홍"></div>
        <div><label>금액</label><input id="price" type="number" placeholder="단가"></div>
        <div><label>단위</label><select id="unit"><option>EA</option><option>SET</option><option>BOX</option><option>개</option><option>권</option><option>봉</option></select></div>
        <div><label>수량</label><input id="qty" type="number" value="1"></div>
        <div><label>사용용도</label><input id="purpose" placeholder="예: 미술영역 비치용"></div>
      </div>
      <div class="btns" style="margin-top:12px;">
        <button class="primary" id="addBtn" onclick="addItem()">품목 추가</button>
        <button id="copyBtn" onclick="copyLastMonth()">지난달 신청서 복사</button>
        <button class="green" id="submitBtn" onclick="submitRoom()">신청 완료</button>
        <button class="danger" id="cancelSubmitBtn" onclick="cancelSubmit()" style="display:none;">신청 취소</button>
      </div>
      <div id="formError" class="error-box"></div>
      <div id="formSuccess" class="success-box"></div>
    </div>

    <div class="card">
      <h2 id="myListTitle">소모품 신청 목록</h2>
      <div class="summary">
        <div>총 품목 수<br><span id="myCount">0</span></div>
        <div id="myTotalBox">총 금액<br><span id="myTotal">0원</span><br><span class="small" id="budgetMessage">예산 미입력</span></div>
        <div>신청 상태<br><span id="myStatus">작성중</span></div>
        <div>예산 상태<br><span id="budgetStatus">정상</span></div>
      </div>
      <div class="table-wrap"><table id="myTable"></table></div>
    </div>
  </section>

  <section id="panel-sites" class="panel">
    <div class="card">
      <h2>구매 가능 사이트</h2>
      <div class="grid-3" id="fixedSites"></div>
    </div>
  </section>

  <section id="panel-common" class="panel">
    <div class="card">
      <h2>공동 소모품 신청서</h2>
      <div class="grid">
        <div><label>연도/월</label><input type="month" id="commonMonth" onchange="renderCommon()"></div>
        <div><label>구매처</label><select id="commonVendor" onchange="toggleCommonProductNo()"><option>우림문구</option><option>G마켓</option><option>기타 지정 사이트</option></select></div>
        <div id="commonProductNoBox" class="hidden"><label>G마켓 상품번호</label><input id="commonProductNo" placeholder="G마켓일 때만 입력"></div>
        <div><label>품명</label><input id="commonItemName"></div>
        <div><label>크기</label><input id="commonItemSize"></div>
        <div><label>색상</label><input id="commonItemColor"></div>
        <div><label>금액</label><input id="commonPrice" type="number"></div>
        <div><label>단위</label><select id="commonUnit"><option>EA</option><option>SET</option><option>BOX</option><option>개</option><option>권</option><option>봉</option></select></div>
        <div><label>수량</label><input id="commonQty" type="number" value="1"></div>
        <div><label>사용용도</label><input id="commonPurpose" placeholder="예: 공동 소모품"></div>
      </div>
      <div class="btns" style="margin-top:12px;"><button class="primary" onclick="addCommonItem()">공동 품목 추가</button></div>
      <div id="commonMessage" class="success-box"></div>
    </div>
    <div class="card">
      <h2>공동 소모품 신청 목록</h2>
      <div class="table-wrap"><table id="commonTable"></table></div>
    </div>
  </section>

  <section id="panel-collect" class="panel">
    <div class="card">
      <h2>소모품담당자 페이지 - 소모품 취합</h2>
      <div class="grid-3">
        <div><label>조회 월</label><input type="month" id="filterMonth" onchange="renderCollect()"></div>
        <div><label>연령별 조회</label><select id="filterAge" onchange="renderCollect()"><option value="">전체</option><option>만1세</option><option>만2세</option><option>만3세</option><option>만4세</option><option>만5세</option></select></div>
        <div><label>반명 검색</label><input id="filterRoom" oninput="renderCollect()" placeholder="반명 입력"></div>
      </div>
      <div class="btns" style="margin-top:12px;">
        <button onclick="setAgeFilter('만1세')">만1세</button>
        <button onclick="setAgeFilter('만2세')">만2세</button>
        <button onclick="setAgeFilter('만3세')">만3세</button>
        <button onclick="setAgeFilter('만4세')">만4세</button>
        <button onclick="setAgeFilter('만5세')">만5세</button>
        <button class="green" onclick="exportExcel()">엑셀 다운로드</button>
        <button onclick="window.print()">인쇄/PDF 저장</button>
      </div>
    </div>
    <div class="card">
      <h2 id="collectTitle">소모품 신청서(전체연령)</h2>
      <div class="summary">
        <div>품목 수<br><span id="allCount">0</span></div>
        <div>총 금액<br><span id="allTotal">0원</span></div>
        <div>제출완료 반<br><span id="submittedRooms">0</span></div>
        <div>작성중 반<br><span id="draftRooms">0</span></div>
      </div>
      <div class="table-wrap"><table id="allTable"></table></div>
    </div>
  </section>

  <section id="panel-history" class="panel">
    <div class="card">
      <h2>수정·삭제 기록</h2>
      <div class="table-wrap"><table id="historyTable"></table></div>
    </div>
  </section>
</div>

<script>
const STORAGE_KEYS = {
  items: 'consumable_items_v4',
  history: 'consumable_history_v4',
  roomStatus: 'consumable_room_status_v4'
};

const AUTO_LOGOUT_SECONDS = 30 * 60;
let logoutRemain = AUTO_LOGOUT_SECONDS;
let logoutTimerId = null;

const classMap = {
  "만1세": ["햇빛반","달빛반","별빛반","풀빛반","온빛반"],
  "만2세": ["예빛반","봄빛반","물빛반","꿈빛반"],
  "만3세": ["한빛반","은빛반","새빛반"],
  "만4세": ["윤빛반","꽃빛반"],
  "만5세": ["들빛반","솔빛반"]
};

const AGE_BUDGETS = {
  "만1세": { total: 0, rooms: 1 },
  "만2세": { total: 150000, rooms: 4 },
  "만3세": { total: 0, rooms: 1 },
  "만4세": { total: 0, rooms: 1 },
  "만5세": { total: 0, rooms: 1 }
};

const FIXED_SITES = [
  { name: "우림문구", url: "https://www.woorimungo.co.kr", desc: "문구류, 미술재료 등 지정 구매처" },
  { name: "G마켓", url: "https://www.gmarket.co.kr", desc: "G마켓 신청 시 상품번호 입력 필요" },
  { name: "기타 지정 사이트", url: "#", desc: "기관에서 별도로 허용한 구매처가 있을 때만 사용" }
];

let currentUser = null;
let currentMode = "teacher";

function load(key){ return JSON.parse(localStorage.getItem(key) || '[]'); }
function save(key, data){ localStorage.setItem(key, JSON.stringify(data)); }
function money(n){ return Number(n || 0).toLocaleString("ko-KR") + "원"; }
function today(){ return new Date().toLocaleString("ko-KR"); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function getSavedUser(){
  try {
    return JSON.parse(localStorage.getItem("libraryCurrentUser") || localStorage.getItem("materialsCurrentUser") || "null");
  } catch { return null; }
}

function getAgeByClass(className){
  for(const [age, classes] of Object.entries(classMap)){
    if(classes.includes(className)) return age;
  }
  return "";
}

function isAdmin(){
  return currentUser?.role === "admin";
}

function isConsumableManager(){
  return isAdmin() ||
    currentUser?.consumable_role === "manager" ||
    currentUser?.consumables_role === "manager" ||
    currentUser?.supply_role === "manager" ||
    currentUser?.supplies_role === "manager";
}

function getRoleText(){
  if(isAdmin()) return "관리자";
  if(isConsumableManager()) return "소모품담당자";
  return "선생님";
}

function requireLogin(){
  currentUser = getSavedUser();
  if(!currentUser){
    alert("로그인이 필요합니다.");
    location.href = "index.html";
    return false;
  }
  if(!currentUser.age) currentUser.age = getAgeByClass(currentUser.class_name);
  if(!currentUser.class_name) currentUser.class_name = currentUser.room || "";
  return true;
}

function setDefaultMonth(){
  const ym = new Date().toISOString().slice(0,7);
  document.getElementById("month").value = ym;
  document.getElementById("filterMonth").value = ym;
  document.getElementById("commonMonth").value = ym;
}

function applyLoginProfile(){
  document.getElementById("age").value = currentUser.age || "";
  document.getElementById("room").value = currentUser.class_name || "";
  document.getElementById("writer").value = currentUser.name || "";
  document.getElementById("loginName").textContent = currentUser.name || "-";
  document.getElementById("loginClass").textContent = currentUser.class_name || "-";
  document.getElementById("loginRole").textContent = currentMode === "manager" ? "소모품담당자 페이지" : "반별 신청 페이지";
  updateRoomTitle();
}

function setupPermissionUI(){
  const manager = isConsumableManager();
  const admin = isAdmin();

  document.getElementById("managerModeBtn").classList.toggle("hidden", !manager);
  document.querySelectorAll(".manager-tab").forEach(el => el.classList.toggle("hidden", currentMode !== "manager" || !manager));
  document.querySelectorAll(".admin-tab").forEach(el => el.classList.toggle("hidden", currentMode !== "manager" || !admin));
}

function setMode(mode){
  if(mode === "manager" && !isConsumableManager()){
    alert("소모품담당자 권한이 없습니다.");
    return;
  }
  currentMode = mode;
  applyLoginProfile();
  setupPermissionUI();
  openPanel(mode === "manager" ? "collect" : "apply");
}

function openPanel(name){
  if((name === "common" || name === "collect") && !isConsumableManager()){
    alert("소모품담당자만 확인할 수 있습니다.");
    return;
  }
  if(name === "history" && !isAdmin()){
    alert("관리자만 확인할 수 있습니다.");
    return;
  }
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("panel-" + name).classList.add("active");
  document.getElementById("tab-" + name).classList.add("active");
  renderMy();
  renderFixedSites();
  renderCommon();
  renderCollect();
  renderHistory();
}

function startAutoLogout(){
  if(logoutTimerId) clearInterval(logoutTimerId);
  logoutRemain = AUTO_LOGOUT_SECONDS;
  updateLogoutDisplay();
  logoutTimerId = setInterval(() => {
    logoutRemain--;
    updateLogoutDisplay();
    if(logoutRemain <= 0) logout();
  }, 1000);

  ["click","keydown","touchstart"].forEach(evt => {
    document.addEventListener(evt, () => {
      logoutRemain = AUTO_LOGOUT_SECONDS;
      updateLogoutDisplay();
    }, { passive: true });
  });
}

function updateLogoutDisplay(){
  const m = String(Math.floor(logoutRemain / 60)).padStart(2, "0");
  const s = String(logoutRemain % 60).padStart(2, "0");
  document.getElementById("autoLogoutTimer").textContent = `${m}:${s}`;
}

function goPortal(){ location.href = "index.html"; }

function logout(){
  localStorage.removeItem("libraryCurrentUser");
  localStorage.removeItem("materialsCurrentUser");
  location.href = "index.html";
}

function getPerRoomBudget(age){
  const config = AGE_BUDGETS[age];
  if(!config || !config.total) return 0;
  return Math.floor(config.total / (config.rooms || 1));
}
function getAgeTotalBudget(age){ return AGE_BUDGETS[age]?.total || 0; }
function getAgeCurrentTotal(month, age){
  return load(STORAGE_KEYS.items).filter(x => x.month === month && x.age === age && !x.deleted && !x.isCommon)
    .reduce((sum, x) => sum + x.price * x.qty, 0);
}
function getRoomCurrentTotal(month, room){
  return load(STORAGE_KEYS.items).filter(x => x.month === month && x.room === room && !x.deleted && !x.isCommon)
    .reduce((sum, x) => sum + x.price * x.qty, 0);
}

function updateRoomTitle(){
  document.getElementById("myListTitle").textContent = `${currentUser?.class_name || ""} 소모품 신청 목록`;
}

function toggleProductNo(){
  document.getElementById("productNoBox").classList.toggle("hidden", document.getElementById("vendor").value !== "G마켓");
}
function toggleCommonProductNo(){
  document.getElementById("commonProductNoBox").classList.toggle("hidden", document.getElementById("commonVendor").value !== "G마켓");
}

function showFormMessage(type, message){
  const errorBox = document.getElementById("formError");
  const successBox = document.getElementById("formSuccess");
  errorBox.style.display = "none";
  successBox.style.display = "none";
  const box = type === "error" ? errorBox : successBox;
  box.innerHTML = message;
  box.style.display = "block";
  box.scrollIntoView({ behavior: "smooth", block: "center" });
}

}

function addItem(){
  clearFormMessage();
  const month = document.getElementById("month").value;
  const age = document.getElementById("age").value;
  const room = document.getElementById("room").value.trim();
  const writer = document.getElementById("writer").value.trim();
  const vendor = document.getElementById("vendor").value;
  const productNo = document.getElementById("productNo").value.trim();
  const itemName = document.getElementById("itemName").value.trim();
  const price = Number(document.getElementById("price").value || 0);
  const qty = Number(document.getElementById("qty").value || 1);
  const newAmount = price * qty;

  if(isSubmitted(month, room)){ showFormMessage("error", "🔒 신청 완료 상태입니다. 품목을 추가하려면 신청 취소를 먼저 눌러주세요."); return; }
  if(!month || !itemName){ showFormMessage("error", "⚠️ 연도/월과 품명은 필수입니다."); return; }
  if(price <= 0){ showFormMessage("error", "⚠️ 금액을 입력해주세요."); return; }
  if(qty <= 0){ showFormMessage("error", "⚠️ 수량을 입력해주세요."); return; }
  if(vendor === "G마켓" && !productNo){ showFormMessage("error", "⚠️ G마켓 구매 품목은 상품번호를 입력해주세요."); return; }

  const roomBudget = getPerRoomBudget(age);
  const totalBudget = getAgeTotalBudget(age);
  const roomCurrentTotal = getRoomCurrentTotal(month, room);
  const ageCurrentTotal = getAgeCurrentTotal(month, age);

  if(roomBudget > 0 && roomCurrentTotal + newAmount > roomBudget){
    showFormMessage("error", `🚨 금액이 초과되었습니다.<br>저장할 수 없습니다.<br><br>반명: ${room}<br>현재 반 사용액: ${money(roomCurrentTotal)}<br>추가 금액: ${money(newAmount)}<br>반별 한도: ${money(roomBudget)}`);
    renderMy(); return;
  }
  if(totalBudget > 0 && ageCurrentTotal + newAmount > totalBudget){
    showFormMessage("error", `🚨 금액이 초과되었습니다.<br>저장할 수 없습니다.<br><br>연령: ${age}<br>현재 ${age} 전체 사용액: ${money(ageCurrentTotal)}<br>추가 금액: ${money(newAmount)}<br>${age} 전체 예산: ${money(totalBudget)}`);
    renderMy(); return;
  }

  const item = {
    id: uid(), month, age, room, writer, vendor,
    productNo: vendor === "G마켓" ? productNo : "",
    itemName,
    itemSize: document.getElementById("itemSize").value.trim(),
    itemColor: document.getElementById("itemColor").value.trim(),
    price, unit: document.getElementById("unit").value, qty,
    purpose: document.getElementById("purpose").value.trim(),
    createdBy: writer, createdAt: today(), deleted: false, isCommon: false
  };

  const items = load(STORAGE_KEYS.items);
  items.push(item);
  save(STORAGE_KEYS.items, items);
  addHistory("추가", item.itemName, null, item);

  ["productNo","itemName","itemSize","itemColor","price","purpose"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("qty").value = 1;
  renderMy(); renderCollect(); renderHistory();
  showFormMessage("success", "✅ 품목이 추가되었습니다.");
}

function canEdit(item){
  return item.createdBy === currentUser.name || isConsumableManager();
}

function softDeleteItem(id){
  const items = load(STORAGE_KEYS.items);
  const item = items.find(x => x.id === id);
  if(!item) return;

  if(!item.isCommon && !isConsumableManager() && isSubmitted(item.month, item.room)){
    showFormMessage("error", "🔒 신청 완료 상태입니다. 삭제하려면 신청 취소를 먼저 눌러주세요.");
    return;
  }
  if(!canEdit(item)){ showFormMessage("error", "⚠️ 본인이 작성한 항목만 삭제할 수 있습니다."); return; }

  const before = {...item};
  item.deleted = true;
  item.deletedBy = currentUser.name;
  item.deletedAt = today();
  save(STORAGE_KEYS.items, items);
  addHistory("삭제", item.itemName, before, item);
  renderMy(); renderCommon(); renderCollect(); renderHistory();
  if(document.getElementById("formSuccess")) showFormMessage("success", "✅ 삭제 처리되었습니다.");
}

function restoreItem(id){
  if(!isAdmin()){ alert("관리자만 복구할 수 있습니다."); return; }
  const items = load(STORAGE_KEYS.items);
  const item = items.find(x => x.id === id);
  if(!item) return;
  const before = {...item};
  item.deleted = false;
  item.restoredBy = currentUser.name;
  item.restoredAt = today();
  save(STORAGE_KEYS.items, items);
  addHistory("복구", item.itemName, before, item);
  renderMy(); renderCommon(); renderCollect(); renderHistory();
}

function renderMy(){
  const month = document.getElementById("month").value;
  const room = document.getElementById("room").value.trim();
  const age = document.getElementById("age").value;
  const items = load(STORAGE_KEYS.items).filter(x => x.month === month && x.room === room && !x.deleted && !x.isCommon);
  const roomTotal = items.reduce((sum, x) => sum + x.price * x.qty, 0);
  const ageTotal = getAgeCurrentTotal(month, age);
  const roomBudget = getPerRoomBudget(age);
  const totalBudget = getAgeTotalBudget(age);

  document.getElementById("myCount").textContent = items.length;
  document.getElementById("myTotal").textContent = money(roomTotal);
  updateRoomTitle();

  const totalBox = document.getElementById("myTotalBox");
  const budgetMessage = document.getElementById("budgetMessage");
  const budgetStatus = document.getElementById("budgetStatus");
  totalBox.classList.remove("over-budget", "budget-ok", "budget-warning");

  if(totalBudget > 0 && roomBudget > 0){
    const roomRemaining = roomBudget - roomTotal;
    const ageRemaining = totalBudget - ageTotal;
    if(roomRemaining < 0 || ageRemaining < 0){
      totalBox.classList.add("over-budget");
      budgetMessage.textContent = `초과 / 반 한도 ${money(roomBudget)} · ${age} 전체 ${money(totalBudget)}`;
      budgetStatus.textContent = "초과";
    } else if(roomRemaining <= roomBudget * .1 || ageRemaining <= totalBudget * .1){
      totalBox.classList.add("budget-warning");
      budgetMessage.textContent = `반 남은 금액 ${money(roomRemaining)} / ${age} 전체 남은 금액 ${money(ageRemaining)}`;
      budgetStatus.textContent = "주의";
    } else {
      totalBox.classList.add("budget-ok");
      budgetMessage.textContent = `반 남은 금액 ${money(roomRemaining)} / ${age} 전체 남은 금액 ${money(ageRemaining)}`;
      budgetStatus.textContent = "정상";
    }
  } else {
    budgetMessage.textContent = "예산 미입력";
    budgetStatus.textContent = "미설정";
  }

  const st = load(STORAGE_KEYS.roomStatus).find(s => s.month === month && s.room === room)?.status || "작성중";
  const locked = st === "제출완료";
  document.getElementById("myStatus").textContent = st;
  document.getElementById("inputArea").classList.toggle("locked-area", locked);
  document.getElementById("lockNotice").style.display = locked ? "block" : "none";
  document.getElementById("addBtn").disabled = locked;
  document.getElementById("copyBtn").disabled = locked;
  document.getElementById("submitBtn").style.display = locked ? "none" : "inline-block";
  document.getElementById("cancelSubmitBtn").style.display = locked ? "inline-block" : "none";
  document.getElementById("myTable").innerHTML = makeItemTable(items, locked);
}

function makeItemTable(items, locked=false){
  let html = `<tr><th>번호</th><th>반 이름</th><th>신청자</th><th>구매처</th><th>상품번호</th><th>품명</th><th>크기</th><th>색상</th><th>단가</th><th>단위</th><th>수량</th><th>금액</th><th>사용용도</th><th>관리</th></tr>`;
  if(items.length === 0) return html + `<tr><td colspan="14">등록된 품목이 없습니다.</td></tr>`;
  items.forEach((x, i) => {
    html += `<tr class="${locked ? "locked-row" : ""}">

    </tr>`;
  });
  return html;
}

function copyLastMonth(){
  clearFormMessage();
  const month = document.getElementById("month").value;
  const room = document.getElementById("room").value.trim();
  const age = document.getElementById("age").value;
  if(isSubmitted(month, room)){ showFormMessage("error", "🔒 신청 완료 상태입니다. 복사하려면 신청 취소를 먼저 눌러주세요."); return; }
  if(!month || !room){ alert("월과 반명을 확인해주세요."); return; }

  const d = new Date(month + "-01");
  d.setMonth(d.getMonth() - 1);
  const lastMonth = d.toISOString().slice(0,7);
  const items = load(STORAGE_KEYS.items);
  const targets = items.filter(x => x.month === lastMonth && x.room === room && !x.deleted && !x.isCommon);
  if(targets.length === 0){ alert("지난달 신청 품목이 없습니다."); return; }

  const copiedAmount = targets.reduce((sum, x) => sum + x.price * x.qty, 0);
  const roomBudget = getPerRoomBudget(age);
  const totalBudget = getAgeTotalBudget(age);
  const roomCurrentTotal = getRoomCurrentTotal(month, room);
  const ageCurrentTotal = getAgeCurrentTotal(month, age);

  if(roomBudget > 0 && roomCurrentTotal + copiedAmount > roomBudget){ alert(`지난달 신청서를 복사하면 반별 한도를 초과합니다.\n\n복사 금액: ${money(copiedAmount)}\n반별 한도: ${money(roomBudget)}`); return; }
  if(totalBudget > 0 && ageCurrentTotal + copiedAmount > totalBudget){ alert(`지난달 신청서를 복사하면 연령 전체 예산을 초과합니다.\n\n복사 금액: ${money(copiedAmount)}\n${age} 전체 예산: ${money(totalBudget)}`); return; }

  const copied = targets.map(x => ({...x, id: uid(), month, writer: currentUser.name, createdBy: currentUser.name, createdAt: today(), deleted: false}));
  save(STORAGE_KEYS.items, items.concat(copied));
  addHistory("지난달 복사", room, {lastMonth}, {month, count: copied.length});
  renderMy(); renderCollect(); renderHistory();
}

function getKoreanMonthTitle(month, age){
  if(!month) return `소모품 신청서(${age || "전체연령"})`;
  const [, mm] = month.split("-");
  return `${Number(mm)}월 소모품 신청서(${age || "전체연령"})`;
}

    ["※ 작성시 참고사항", "", "", "", "", "", "", "", "", ""],
    ["1. 보육사 홈페이지 및 책자의 상품명을 그대로 작성하시기 바랍니다.", "", "", "", "", "", "", "", "", ""],
    ["2. 구매처 색상을 자세히 기입 바랍니다.", "", "", "", "", "", "", "", "", ""],
    ["3. G마켓 신청 품목은 상품번호를 기입해주시기 바랍니다.", "", "", "", "", "", "", "", "", ""]
  ];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws["!cols"] = [{wch:6},{wch:30},{wch:14},{wch:14},{wch:12},{wch:8},{wch:8},{wch:12},{wch:24},{wch:18}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "소모품신청서");
  XLSX.writeFile(wb, `${month || "전체"}_${age || "전체연령"}_소모품신청서.xlsx`);
}

function init(){
  if(!requireLogin()) return;
  setDefaultMonth();
  applyLoginProfile();
  setupPermissionUI();
  renderFixedSites();
  toggleProductNo();
  toggleCommonProductNo();
  startAutoLogout();

  if(isConsumableManager()) setMode("teacher");
  else {
    currentMode = "teacher";
    setupPermissionUI();
    openPanel("apply");
  }
}

init();
</script>
