<!DOCTYPE html><html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>탕정삼성어린이집 통합 관리 포털</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      background: #f5f7fa;
      color: #111827;
    }.header {
  background: white;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid #e5e7eb;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.header h1 {
  margin: 0;
  font-size: 2rem;
  text-align: center;
}

.subtext {
  text-align: center;
  color: #6b7280;
  margin: 14px 20px 0;
  font-size: 1rem;
}

.portal-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  min-height: calc(100vh - 120px);
}

.portal-card {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-decoration: none;
  color: white;
  padding: 40px 20px;
  transition: transform 0.25s ease, filter 0.25s ease;
  position: relative;
  overflow: hidden;
}

.portal-card:hover {
  transform: scale(1.02);
  filter: brightness(1.05);
}

.portal-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.06);
}

.library {
  background: linear-gradient(135deg, #1d9bf0, #2563eb);
}

.materials {
  background: linear-gradient(135deg, #84cc16, #22c55e);
}

.card-content {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 500px;
}

.icon {
  font-size: 5rem;
  margin-bottom: 20px;
}

.portal-card h2 {
  font-size: 3rem;
  margin: 0 0 14px;
  font-weight: 800;
}

.portal-card p {
  font-size: 1.15rem;
  line-height: 1.7;
  margin: 0;
  opacity: 0.95;
}

.footer {
  text-align: center;
  padding: 14px;
  background: white;
  border-top: 1px solid #e5e7eb;
  font-size: 0.95rem;
  color: #6b7280;
}

@media (max-width: 900px) {
  .portal-container {
    grid-template-columns: 1fr;
  }

  .portal-card {
    min-height: 50vh;
  }

  .portal-card h2 {
    font-size: 2.3rem;
  }

  .icon {
    font-size: 4rem;
  }
}

  </style>
</head>
<body>  <header class="header">
    <h1>탕정삼성어린이집 통합 관리 포털</h1>
  </header>  <p class="subtext">
    도서관리 및 교재교구관리를 하나의 포털에서 효율적으로 운영하세요.
  </p>  <main class="portal-container">
    <a href="library.html" class="portal-card library">
      <div class="card-content">
        <div class="icon">📚</div>
        <h2>도서관리 시스템</h2>
      </div>
    </a><a href="materials.html" class="portal-card materials">
  <div class="card-content">
    <div class="icon">🧩</div>
    <h2>교재교구관리 시스템</h2>
  </div>
</a>

  </main>  <footer class="footer">
    기타 문의사항: 김혜인 교사 | 탕정삼성어린이집
  </footer></body>
</html>
