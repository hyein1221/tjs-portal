<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>탕정삼성어린이집 통합 관리 포털</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .header {
      background: white;
      padding: 18px 24px;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .logo {
      width: 58px;
      height: auto;
      object-fit: contain;
    }

    .header h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
    }

    .subtext {
      text-align: center;
      color: #6b7280;
      margin: 14px 20px 18px;
      font-size: 1rem;
    }

    .portal-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px 30px;
    }

    .portal-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      min-height: 72vh;
    }

    .portal-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      color: white;
      padding: 50px 30px;
      border-radius: 24px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    .portal-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 36px rgba(0,0,0,0.12);
    }

    .library {
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
    }

    .materials {
      background: linear-gradient(135deg, #86efac, #22c55e);
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .portal-card h2 {
      font-size: 2.4rem;
      margin: 0 0 16px;
      font-weight: 800;
    }

    .portal-card p {
      font-size: 1.05rem;
      line-height: 1.7;
      margin: 0;
      max-width: 420px;
      opacity: 0.95;
    }

    .footer {
      text-align: center;
      padding: 18px;
      background: white;
      border-top: 1px solid #e5e7eb;
      font-size: 0.95rem;
      color: #6b7280;
      margin-top: 20px;
    }

    @media (max-width: 1000px) {
      .portal-container {
        grid-template-columns: 1fr;
      }

      .portal-card {
        min-height: 320px;
      }

      .portal-card h2 {
        font-size: 2rem;
      }

      .icon {
        font-size: 3.5rem;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .logo {
        width: 46px;
      }
    }

    @media (max-width: 600px) {
      .portal-wrapper {
        padding: 0 14px 20px;
      }

      .portal-card {
        padding: 40px 20px;
        border-radius: 18px;
      }

      .portal-card h2 {
        font-size: 1.7rem;
      }

      .portal-card p {
        font-size: 0.95rem;
      }

      .subtext {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <img src="logo.png" alt="탕정삼성어린이집 로고" class="logo">
      <h1>탕정삼성어린이집 통합 관리 포털</h1>
    </div>
  </header>



  <div class="portal-wrapper">
    <main class="portal-container">

      <a href="library.html" class="portal-card library">
        <div class="icon">📚</div>
        <h2>도서관리 시스템</h2>
      </a>

      <a href="materials.html" class="portal-card materials">
        <div class="icon">🧩</div>
        <h2>교재교구관리 시스템</h2>
      </a>

    </main>
  </div>

  <footer class="footer">
    기타 문의사항: 김혜인 교사 | 탕정삼성어린이집
  </footer>

</body>
</html>
