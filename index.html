<!-- 탕정삼성어린이집 통합포털 관리자 탭 확장 버전 -->
<!-- 기존 index.html 교체용 -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>탕정삼성어린이집 통합 관리 포털</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin:0; font-family: Pretendard, sans-serif; background:#f6f7fb; }
    .hidden { display:none; }
    .tabs { display:flex; gap:8px; margin:20px 0; flex-wrap:wrap; }
    .tab-btn { padding:10px 16px; border:1px solid #ccc; background:white; cursor:pointer; border-radius:8px; }
    .tab-btn.active { background:#dbeafe; font-weight:700; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    table { width:100%; border-collapse:collapse; margin-bottom:24px; background:white; }
    th, td { border:1px solid #ddd; padding:8px; text-align:center; font-size:13px; }
    th { background:#f3f4f6; }
    button { padding:6px 10px; margin:2px; }
    textarea { width:100%; min-height:60px; }
    .admin-box { background:white; padding:24px; border-radius:16px; }
  </style>
</head>
<body>

<div id="admin-screen" class="admin-box">
  <h2>통합 관리자 페이지</h2>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchAdminTab('user-tab', this)">사용자 관리</button>
    <button class="tab-btn" onclick="switchAdminTab('library-tab', this)">도서관리</button>
    <button class="tab-btn" onclick="switchAdminTab('materials-tab', this)">교재교구관리</button>
  </div>

  <!-- 사용자 관리 -->
  <div id="user-tab" class="tab-content active">
    <h3>회원가입 승인 요청</h3>
    <table>
      <thead><tr><th>이름</th><th>아이디</th><th>반</th><th>처리</th></tr></thead>
      <tbody id="pending-user-list"></tbody>
    </table>

    <h3>반 변경 요청</h3>
    <table>
      <thead><tr><th>이름</th><th>현재반</th><th>요청반</th><th>처리</th></tr></thead>
      <tbody id="class-change-list"></tbody>
    </table>

    <h3>현재 사용자 목록</h3>
    <table>
      <thead><tr><th>이름</th><th>아이디</th><th>반</th><th>도서권한</th><th>교재교구권한</th></tr></thead>
      <tbody id="all-user-list"></tbody>
    </table>
  </div>

  <!-- 도서관리 -->
  <div id="library-tab" class="tab-content">
    <h3>도서담당자 권한 요청</h3>
    <table>
      <thead><tr><th>이름</th><th>현재권한</th><th>요청</th><th>처리</th></tr></thead>
      <tbody id="library-manager-request-list"></tbody>
    </table>

    <h3>현재 도서담당자 목록</h3>
    <table>
      <thead><tr><th>이름</th><th>반</th><th>권한변경</th></tr></thead>
      <tbody id="library-manager-list"></tbody>
    </table>

    <h3>삭제 도서 복구</h3>
    <table>
      <thead><tr><th>도서명</th><th>관리번호</th><th>복구</th></tr></thead>
      <tbody id="deleted-books-list"></tbody>
    </table>
  </div>

  <!-- 교재교구관리 -->
  <div id="materials-tab" class="tab-content">
    <h3>교재교구담당자 권한 요청</h3>
    <table>
      <thead><tr><th>이름</th><th>현재권한</th><th>요청</th><th>처리</th></tr></thead>
      <tbody id="material-manager-request-list"></tbody>
    </table>

    <h3>현재 교재교구담당자 목록</h3>
    <table>
      <thead><tr><th>이름</th><th>반</th><th>권한변경</th></tr></thead>
      <tbody id="material-manager-list"></tbody>
    </table>

    <h3>삭제 교재교구 복구</h3>
    <table>
      <thead><tr><th>물품명</th><th>관리번호</th><th>복구</th></tr></thead>
      <tbody id="deleted-materials-list"></tbody>
    </table>
  </div>
</div>

<script>
const supabaseUrl = "YOUR_SUPABASE_URL";
const supabaseKey = "YOUR_SUPABASE_KEY";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

function switchAdminTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(tab => tab.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');
}

async function loadPendingUsers() {
  const { data } = await supabaseClient.from('users').select('*').eq('approval_status','pending');
  const tbody = document.getElementById('pending-user-list');
  tbody.innerHTML = '';
  data?.forEach(user => {
    tbody.innerHTML += `
      <tr>
        <td>${user.name}</td>
        <td>${user.username}</td>
        <td>${user.class_name}</td>
        <td>
          <button onclick="approveUser('${user.id}')">승인</button>
          <button onclick="rejectUser('${user.id}')">거절</button>
        </td>
      </tr>`;
  });
}

async function rejectUser(userId) {
  const reason = prompt('거절 사유를 입력하세요');
  if (!reason) return;
  await supabaseClient.from('users').update({
    approval_status:'rejected',
    rejected_reason:reason,
    rejected_at:new Date().toISOString()
  }).eq('id', userId);
  loadPendingUsers();
}

async function loadClassChangeRequests() {}
async function loadAllUsers() {}
async function loadLibraryRequests() {}
async function loadLibraryManagers() {}
async function loadDeletedBooks() {}
async function loadMaterialRequests() {}
async function loadMaterialManagers() {}
async function loadDeletedMaterials() {}

async function initializeAdminPage() {
  await loadPendingUsers();
  await loadClassChangeRequests();
  await loadAllUsers();
  await loadLibraryRequests();
  await loadLibraryManagers();
  await loadDeletedBooks();
  await loadMaterialRequests();
  await loadMaterialManagers();
  await loadDeletedMaterials();
}

initializeAdminPage();
</script>

</body>
</html>
